<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Connexion - Carnet de Contacts</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { background: linear-gradient(135deg, #34495e 0%, #2c3e50 100%); height: 100vh; }
        .login-card { border: none; border-radius: 16px; box-shadow: 0 10px 30px rgba(0, 0, 0, 0.2); }
    </style>
</head>
<body class="d-flex align-items-center justify-content-center">

    <div class="container" style="max-width: 420px;">
        <div class="card login-card p-4 bg-white">
            <div class="text-center mb-4">
                <span style="font-size: 50px;">🔐</span>
                <h3 class="mt-2 fw-bold text-dark">Authentification</h3>
                <p class="text-muted small">Connectez-vous ou visitez en tant qu'invité</p>
            </div>

            {% with messages = get_flashed_messages(category_filter=["error"]) %}
              {% if messages %}
                <div class="alert alert-danger py-2 small" role="alert">⚠️ {{ messages[0] }}</div>
              {% endif %}
            {% endwith %}

            <form method="POST" action="/">
                <div class="mb-3">
                    <label class="form-label small fw-semibold text-secondary">Nom d'utilisateur</label>
                    <input type="text" name="username" class="form-control form-control-lg bg-light" required>
                </div>
                <div class="mb-4">
                    <label class="form-label small fw-semibold text-secondary">Mot de passe</label>
                    <input type="password" name="password" class="form-control form-control-lg bg-light" required>
                </div>
                <button type="submit" class="btn btn-primary btn-lg w-100 fw-bold shadow-sm" style="background-color: #34495e; border: none;">
                    Se connecter
                </button>
            </form>

            <div class="text-center mt-4 border-top pt-3">
                <a href="/guest" class="text-decoration-none text-secondary fw-semibold">
                    👁️ Continuer en tant que simple visiteur
                </a>
            </div>
        </div>
    </div>
</body>
</html>
